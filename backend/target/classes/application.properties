spring.application.name=gestion-stock

# ======================================================
# Base de données H2 (développement par défaut)
# ======================================================
spring.datasource.url=jdbc:h2:mem:stockdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Console H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ======================================================
# Configuration PostgreSQL (production)
# Activez avec : spring.profiles.active=prod
# ======================================================
# spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/gestion_stock}
# spring.datasource.username=${DATABASE_USERNAME:postgres}
# spring.datasource.password=${DATABASE_PASSWORD:password}
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.hibernate.ddl-auto=update

# Port du serveur
server.port=8080

# Format des dates
spring.jackson.serialization.write-dates-as-timestamps=false
